AWSTemplateFormatVersion: '2010-09-09'
Description: AWS CloudFormation for nas-backup with complete Multipart and Location permissions.

Parameters:
  environment:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - stg
      - prod
    Description: The deployment environment (must be lowercase).

Resources:
  # S3 Bucket
  NASBackupBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Sub 'nas-backup-${environment}-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: CleanIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
      Tags:
        - Key: 'cloudspout:environment'
          Value: !Ref environment
        - Key: 'cloudspout:project'
          Value: 'nas-backup'
        - Key: 'cloudspout:repository'
          Value: 'cloudspout/nas-backup'

  # IAM Service User
  NASBackupUser:
    Type: 'AWS::IAM::User'
    Properties:
      UserName: !Sub 'nas-backup-${environment}'
      Tags:
        - Key: 'cloudspout:environment'
          Value: !Ref environment
        - Key: 'cloudspout:project'
          Value: 'nas-backup'
        - Key: 'cloudspout:repository'
          Value: 'cloudspout/nas-backup'

  # IAM Managed Policy
  NASBackupManagedPolicy:
    Type: 'AWS::IAM::ManagedPolicy'
    Properties:
      ManagedPolicyName: !Sub 'nas-backup-policy-${environment}'
      Users:
        - !Ref NASBackupUser
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # 1. Account-level Global Access
          - Effect: Allow
            Action:
              - 's3:ListAllMyBuckets'
            Resource: '*'

          # 2. Bucket-level Access (Listing and Configuration)
          - Effect: Allow
            Action:
              - 's3:ListBucket'
              - 's3:GetBucketLocation'
              - 's3:ListBucketMultipartUploads' # Required for resuming failed large uploads
            Resource:
              - !GetAtt NASBackupBucket.Arn

          # 3. Object-level Access (Data movement)
          - Effect: Allow
            Action:
              - 's3:PutObject'
              - 's3:GetObject'
              - 's3:DeleteObject'
              - 's3:AbortMultipartUpload'      # Required to cancel failed chunks
              - 's3:ListMultipartUploadParts'   # Required to verify uploaded chunks
            Resource:
              - !Sub '${NASBackupBucket.Arn}/*'

  # Access Key for the NAS
  NASBackupUserAccessKey:
    Type: 'AWS::IAM::AccessKey'
    Properties:
      UserName: !Ref NASBackupUser

Outputs:
  BucketName:
    Value: !Ref NASBackupBucket
  IAMUserName:
    Value: !Ref NASBackupUser
  AccessKeyId:
    Value: !Ref NASBackupUserAccessKey
  SecretAccessKey:
    Value: !GetAtt NASBackupUserAccessKey.SecretAccessKey
